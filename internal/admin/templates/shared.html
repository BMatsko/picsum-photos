<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f5;
  --surface:#ffffff;
  --border:#e0e0e0;
  --accent:#111111;
  --muted:#888888;
  --danger:#c0392b;
  --success-color:#1e8c4a;
  --text:#1a1a1a;
  --radius:6px;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --nav-bg:#ffffff;
  --nav-border:#e8e8e8;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;display:flex}
nav{width:220px;min-height:100vh;background:var(--nav-bg);border-right:1px solid var(--nav-border);padding:24px 0;display:flex;flex-direction:column;flex-shrink:0}
.brand{padding:0 18px 24px;display:flex;align-items:center;gap:9px}
.brand svg{width:18px;height:22px;flex-shrink:0}
.brand-text{font-size:12px;font-weight:700;letter-spacing:.04em;color:#333;white-space:nowrap}
nav a{display:block;padding:8px 18px;color:#555;text-decoration:none;border-left:2px solid transparent;font-size:13px;transition:all .1s}
nav a:hover{color:var(--accent);background:#f5f5f5}
nav a.on{color:var(--accent);border-left-color:#0E1AFD;background:#f0f0ff;font-weight:500}
.spacer{flex:1}
.logout{padding:12px 14px}
.logout button{width:100%;padding:8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:var(--radius);cursor:pointer;font-size:12px;text-align:left;transition:all .1s}
.logout button:hover{border-color:var(--danger);color:var(--danger)}
main{flex:1;padding:40px 48px;overflow-y:auto;max-width:1100px}
h1{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:6px}
.sub{color:var(--muted);margin-bottom:28px;font-size:13px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.card h2{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:16px;text-transform:uppercase;letter-spacing:.05em}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);font-weight:600}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.btn{display:inline-block;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all .12s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#333}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:#aaa;background:#f8f8f8}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);padding:5px 11px;font-size:12px}
.btn-danger:hover{background:var(--danger);color:#fff}
.alert{padding:11px 16px;border-radius:var(--radius);margin-bottom:20px;font-size:13px}
.alert-ok{background:#edfaf3;border:1px solid #a8dfc0;color:#1a6b3c}
.alert-err{background:#fdf0ef;border:1px solid #f0b8b4;color:#b93126}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
input[type=text],input[type=password],input[type=number],input[type=file]{width:100%;padding:8px 11px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
input:focus{border-color:#0E1AFD;box-shadow:0 0 0 3px rgba(14,26,253,.08)}
select{padding:8px 11px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none}
select:focus{border-color:#0E1AFD}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fr{display:flex;gap:12px;align-items:flex-end}
.fr>*{flex:1}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px}
.stat .num{font-size:30px;font-weight:700;color:var(--accent)}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
img.thumb{width:56px;height:38px;object-fit:cover;border-radius:3px;background:var(--border);display:block}
code{font-family:"SF Mono","Fira Code",monospace;font-size:11px;background:#f0f0f0;border:1px solid var(--border);border-radius:3px;padding:2px 6px;color:#333}
pre{font-family:"SF Mono","Fira Code",monospace;font-size:12px;background:#f8f8f8;border:1px solid var(--border);border-radius:var(--radius);padding:16px;overflow-x:auto;line-height:1.9;color:#333}
a.link{color:#0E1AFD;text-decoration:none}
a.link:hover{text-decoration:underline}
.frow{margin-bottom:14px}
</style>
{{end}}
