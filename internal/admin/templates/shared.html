{{define "style"}}
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2a2a2a;--accent:#e8e8e8;--muted:#666;--danger:#c0392b;--success-color:#27ae60;--text:#d4d4d4;--radius:6px;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;display:flex}
nav{width:210px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:28px 0;display:flex;flex-direction:column;flex-shrink:0}
.brand{padding:0 20px 28px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
nav a{display:block;padding:9px 20px;color:var(--text);text-decoration:none;border-left:2px solid transparent;font-size:13px}
nav a:hover,nav a.on{color:var(--accent);border-left-color:var(--accent);background:rgba(255,255,255,.03)}
.spacer{flex:1}
.logout{padding:12px 16px}
.logout button{width:100%;padding:8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:var(--radius);cursor:pointer;font-size:12px;text-align:left}
.logout button:hover{border-color:var(--danger);color:var(--danger)}
main{flex:1;padding:40px 48px;overflow-y:auto}
h1{font-size:20px;font-weight:600;color:var(--accent);margin-bottom:6px}
.sub{color:var(--muted);margin-bottom:28px;font-size:13px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.card h2{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);font-weight:500}
td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.btn{display:inline-block;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#0f0f0f}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:#555}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);padding:5px 11px;font-size:12px}
.btn-danger:hover{background:var(--danger);color:#fff}
.alert{padding:11px 16px;border-radius:var(--radius);margin-bottom:20px;font-size:13px}
.alert-ok{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);color:#2ecc71}
.alert-err{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);color:#e74c3c}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
input[type=text],input[type=password],input[type=number],input[type=file]{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
input:focus{border-color:#555}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fr{display:flex;gap:12px;align-items:flex-end}
.fr>*{flex:1}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px}
.stat .num{font-size:30px;font-weight:700;color:var(--accent)}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
img.thumb{width:56px;height:38px;object-fit:cover;border-radius:3px;background:var(--border);display:block}
code{font-family:"SF Mono","Fira Code",monospace;font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:2px 6px}
pre{font-family:"SF Mono","Fira Code",monospace;font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;overflow-x:auto;line-height:1.9}
a.link{color:#6b9dce;text-decoration:none}
a.link:hover{text-decoration:underline}
.frow{margin-bottom:14px}
</style>
{{end}}

{{define "nav"}}
<nav>
  <div class="brand">Picsum</div>
  <a href="/admin" {{if eq .Page "dashboard"}}class="on"{{end}}>Dashboard</a>
  <a href="/admin/photos" {{if eq .Page "photos"}}class="on"{{end}}>Photos</a>
  <a href="/admin/seeds" {{if eq .Page "seeds"}}class="on"{{end}}>Seeds</a>
  <a href="/admin/docs" {{if eq .Page "docs"}}class="on"{{end}}>Docs</a>
  <a href="/admin/apikeys" {{if eq .Page "apikeys"}}class="on"{{end}}>API Keys</a>
  <div class="spacer"></div>
  <div class="logout">
    <form method="POST" action="/admin/logout">
      <button type="submit">Sign out</button>
    </form>
  </div>
</nav>
{{end}}
