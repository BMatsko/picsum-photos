<style>
@font-face{font-family:'Terminal Land Mono';src:url('https://storage.braydenmatsko.com/Assets/font/TerminalLandMono-Regular.woff2') format('woff2');font-weight:400;font-style:normal}
@font-face{font-family:'Terminal Land Mono';src:url('https://storage.braydenmatsko.com/Assets/font/TerminalLandMono-Bold.woff2') format('woff2');font-weight:700;font-style:normal}
@font-face{font-family:'Numans';src:url('https://storage.braydenmatsko.com/Assets/font/Numans-Regular.ttf') format('truetype');font-weight:400;font-style:normal}
@font-face{font-family:'Numans';src:url('https://storage.braydenmatsko.com/Assets/font/Numans-Bold.ttf') format('truetype');font-weight:700;font-style:normal}
@font-face{font-family:'Numans';src:url('https://storage.braydenmatsko.com/Assets/font/Numans-Italic.ttf') format('truetype');font-weight:400;font-style:italic}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Brand colors */
  --blue:#5954F9;
  --green:#46CA8D;
  --lilac:#9A86F5;
  --red:#FD0044;
  --aqua:#07CFCC;
  --teal:#084861;

  /* Semantic tokens */
  --bg:#f7f8fa;
  --surface:#ffffff;
  --border:#e5e7eb;
  --accent:var(--blue);
  --primary:var(--aqua);
  --secondary:var(--lilac);
  --destructive:var(--red);
  --foreground:var(--teal);
  --muted:#6b7280;
  --success-color:var(--green);
  --danger:var(--red);
  --text:var(--teal);
  --radius:0.75rem;
  --shadow:0px 2px 12px -1px rgba(0,0,0,0.10);
  --font-heading:'Terminal Land Mono',monospace;
  --font-sans:'Numans','Helvetica Neue',sans-serif;
}

body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;line-height:1.6;min-height:100vh;display:flex}

/* ── Nav ── */
nav{width:224px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;flex-shrink:0;box-shadow:var(--shadow)}
.brand{padding:0 18px 28px;display:flex;align-items:center;gap:10px}
.brand svg{width:18px;height:22px;flex-shrink:0}
.brand-text{font-family:var(--font-heading);font-size:13px;font-weight:700;letter-spacing:-0.02em;color:var(--teal)}
nav a{display:block;padding:9px 18px;color:var(--muted);text-decoration:none;border-left:3px solid transparent;font-family:var(--font-sans);font-size:13px;transition:all .12s}
nav a:hover{color:var(--teal);background:#f0f4ff}
nav a.on{color:var(--blue);border-left-color:var(--blue);background:rgba(89,84,249,.06);font-weight:700}
.spacer{flex:1}
.logout{padding:12px 14px}
.logout button{width:100%;padding:8px 12px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:var(--radius);cursor:pointer;font-family:var(--font-sans);font-size:12px;text-align:left;transition:all .12s}
.logout button:hover{border-color:var(--red);color:var(--red)}

/* ── Layout ── */
main{flex:1;height:100vh;overflow-y:auto;padding:40px 48px}
h1{font-family:var(--font-heading);font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--teal);margin-bottom:6px}
.sub{color:var(--muted);margin-bottom:28px;font-size:13px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.card h2{font-family:var(--font-heading);font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}

/* ── Tables ── */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);font-weight:600;font-family:var(--font-sans)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}

/* ── Buttons ── */
.btn{display:inline-block;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;border:none;text-decoration:none;transition:all .12s;font-family:var(--font-sans)}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 1px 4px rgba(89,84,249,.3)}
.btn-primary:hover{background:#4540e8;box-shadow:0 2px 8px rgba(89,84,249,.4)}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:#aaa;background:#f5f5ff}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);padding:5px 11px;font-size:12px}
.btn-danger:hover{background:var(--red);color:#fff}

/* ── Alerts ── */
.alert{padding:11px 16px;border-radius:var(--radius);margin-bottom:20px;font-size:13px}
.alert-ok{background:rgba(70,202,141,.1);border:1px solid rgba(70,202,141,.35);color:#1a7a4a}
.alert-err{background:rgba(253,0,68,.06);border:1px solid rgba(253,0,68,.25);color:#b8002e}

/* ── Forms ── */
label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em;font-family:var(--font-sans)}
input[type=text],input[type=password],input[type=number],input[type=file]{width:100%;padding:8px 11px;background:#fff;border:1px solid var(--border);border-radius:calc(var(--radius) - 2px);color:var(--text);font-size:13px;font-family:var(--font-sans);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(89,84,249,.12)}
select{padding:8px 11px;background:#fff;border:1px solid var(--border);border-radius:calc(var(--radius) - 2px);color:var(--text);font-size:13px;font-family:var(--font-sans);outline:none}
select:focus{border-color:var(--blue)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fr{display:flex;gap:12px;align-items:flex-end}
.fr>*{flex:1}
.frow{margin-bottom:14px}

/* ── Mobile top bar (hidden on desktop) ── */
.topbar{display:none;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar .brand-text{font-family:var(--font-heading);font-size:13px;font-weight:700;letter-spacing:-0.02em;color:var(--teal)}
.topbar svg.logo{width:16px;height:20px;flex-shrink:0}
.hamburger{margin-left:auto;background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;padding:6px 8px;color:var(--teal);display:flex;align-items:center;line-height:1}
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:98}
.nav-overlay.open{display:block}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ── Mobile responsive ── */
@media(max-width:768px){
  body{flex-direction:column;height:auto;overflow:auto}
  nav{position:fixed;top:0;left:0;z-index:99;height:100%;min-height:100%;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.15)}
  nav.open{transform:translateX(0)}
  .topbar{display:flex}
  main{height:auto;padding:20px 16px;overflow-y:visible}
  .g2,.g3{grid-template-columns:1fr}
  .card{padding:16px}
  h1{font-size:18px}
  pre{font-size:11px}
}

/* ── Stats ── */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow)}
.stat .num{font-family:var(--font-heading);font-size:30px;font-weight:700;letter-spacing:-0.02em;color:var(--teal)}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.08em}

/* ── Misc ── */
img.thumb{width:56px;height:38px;object-fit:cover;border-radius:8px;background:var(--border);display:block}
code{font-family:'Terminal Land Mono',monospace;font-size:11px;background:#f0f0ff;border:1px solid rgba(89,84,249,.15);border-radius:6px;padding:2px 6px;color:var(--blue)}
pre{font-family:'Terminal Land Mono',monospace;font-size:12px;background:#f7f8ff;border:1px solid rgba(89,84,249,.12);border-radius:var(--radius);padding:16px;overflow-x:auto;line-height:1.9;color:var(--teal)}
a.link{color:var(--blue);text-decoration:none}
a.link:hover{text-decoration:underline}
</style>
{{end}}
