{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{block "title" .}}Picsum Admin{{end}}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8e8e8;
    --muted: #666;
    --danger: #c0392b;
    --success: #27ae60;
    --text: #d4d4d4;
    --radius: 6px;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; min-height: 100vh; display: flex; }
  nav { width: 220px; min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); padding: 32px 0; display: flex; flex-direction: column; flex-shrink: 0; }
  nav .brand { padding: 0 24px 32px; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  nav a { display: block; padding: 10px 24px; color: var(--text); text-decoration: none; border-left: 2px solid transparent; transition: all 0.15s; }
  nav a:hover, nav a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(255,255,255,0.03); }
  nav .spacer { flex: 1; }
  nav form { padding: 0 16px; }
  nav form button { width: 100%; padding: 8px 12px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius); cursor: pointer; font-size: 13px; text-align: left; transition: all 0.15s; }
  nav form button:hover { border-color: var(--danger); color: var(--danger); }
  main { flex: 1; padding: 40px 48px; max-width: 1100px; }
  h1 { font-size: 20px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
  .subtitle { color: var(--muted); margin-bottom: 32px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
  .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--accent); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
  td { padding: 12px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; background: var(--border); color: var(--muted); }
  .btn { display: inline-block; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #0f0f0f; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 6px 12px; font-size: 12px; }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .alert { padding: 12px 16px; border-radius: var(--radius); margin-bottom: 24px; font-size: 13px; }
  .alert-success { background: rgba(39,174,96,0.1); border: 1px solid rgba(39,174,96,0.3); color: #2ecc71; }
  .alert-error { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); color: #e74c3c; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  input[type=text], input[type=password], input[type=number], input[type=file] { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: #555; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
  .stat .num { font-size: 32px; font-weight: 700; color: var(--accent); }
  .stat .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  img.thumb { width: 60px; height: 40px; object-fit: cover; border-radius: 3px; background: var(--border); }
  code { font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 2px 6px; }
  pre { font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; overflow-x: auto; line-height: 1.8; }
  .seed-url { font-size: 12px; color: var(--muted); word-break: break-all; }
  a.seed-url { color: #6b9dce; text-decoration: none; }
  a.seed-url:hover { text-decoration: underline; }
  .form-row { margin-bottom: 16px; }
</style>
</head>
<body>
<nav>
  <div class="brand">Picsum</div>
  <a href="/admin" {{if eq .Page "dashboard"}}class="active"{{end}}>Dashboard</a>
  <a href="/admin/photos" {{if eq .Page "photos"}}class="active"{{end}}>Photos</a>
  <a href="/admin/seeds" {{if eq .Page "seeds"}}class="active"{{end}}>Seeds</a>
  <a href="/admin/docs" {{if eq .Page "docs"}}class="active"{{end}}>Docs</a>
  <div class="spacer"></div>
  <form method="POST" action="/admin/logout">
    <button type="submit">Sign out</button>
  </form>
</nav>
<main>
{{block "content" .}}{{end}}
</main>
</body>
</html>{{end}}
