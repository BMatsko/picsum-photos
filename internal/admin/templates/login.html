{{define "login.html"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Picsum Admin — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a; --accent: #e8e8e8; --text: #d4d4d4; --muted: #666; --radius: 6px; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { width: 360px; }
  .brand { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 32px; }
  h1 { font-size: 22px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
  p { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  input[type=password] { width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; outline: none; margin-bottom: 16px; transition: border-color 0.15s; }
  input:focus { border-color: #555; }
  button { width: 100%; padding: 11px; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; }
  button:hover { opacity: 0.9; }
  .error { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); color: #e74c3c; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="box">
  <div class="brand">Picsum Photos</div>
  <h1>Admin</h1>
  <p>Sign in to manage your photo library.</p>
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <form method="POST" action="/admin/login">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autofocus placeholder="Enter admin password">
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>{{end}}
